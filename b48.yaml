esphome:
  name: knob
  friendly_name: Knob
  platformio_options:
    build_flags: '-DBOARD_HAS_PSRAM'
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    then:
      - output.turn_off: gpio40_power_indicator_led
      - output.turn_on: gpio1_screen
      - light.turn_on:
          id: back_light
          brightness: 1

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  #baud_rate: 0

api:

globals:
  - id: pending_target_temp
    type: float
    restore_value: false
    initial_value: '23.0'

  - id: encoder_last_count
    type: int
    restore_value: false
    initial_value: '0'

  - id: encoder_accum
    type: int
    restore_value: false
    initial_value: '0'

  - id: encoder_initialized
    type: bool
    restore_value: false
    initial_value: 'false'

script:
  - id: send_target_temp
    mode: restart
    then:
      - delay: 800ms
      - homeassistant.service:
          service: climate.set_temperature
          data:
            entity_id: climate.hitachi_heatpump
            temperature: !lambda 'return to_string((int) id(pending_target_temp));'

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  mosi_pin: GPIO11
  clk_pin: GPIO10
  interface: hardware

i2c:
  - id: i2c_touchscreen
    sda: GPIO6
    scl: GPIO7
    scan: false

  - id: i2c_sensor
    sda: GPIO38
    scl: GPIO39
    scan: false

output:
  - platform: ledc
    pin: GPIO46
    id: gpio3_backlight_pwm

  - platform: gpio
    inverted: true
    id: gpio40_power_indicator_led
    pin: GPIO40

  - platform: gpio
    id: gpio1_screen
    pin: GPIO1

light:
  - platform: monochromatic
    name: Backlight
    id: back_light
    output: gpio3_backlight_pwm
    restore_mode: ALWAYS_ON

  - platform: esp32_rmt_led_strip
    name: Status Indicator LED
    id: status_indicator_led
    rgb_order: GRB
    pin: GPIO48
    num_leds: 5
    chipset: ws2811

binary_sensor:
  - platform: gpio
    name: Button Press
    id: btn_01
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 15ms
      - delayed_off: 15ms

sensor:
  - platform: rotary_encoder
    id: knob
    name: 'Rotary Encoder'
    pin_a:
      number: GPIO45
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true
    resolution: 4
    filters:
      - debounce: 20ms
    on_value:
      - lambda: |-
          int count = (int) x;
          if (!id(encoder_initialized)) {
            id(encoder_initialized) = true;
            id(encoder_last_count) = count;
            return;
          }
          int delta = count - id(encoder_last_count);
          id(encoder_last_count) = count;
          id(encoder_accum) += delta;
          int steps = id(encoder_accum) / 4;
          if (steps == 0) return;
          id(encoder_accum) -= steps * 4;
          float new_temp = id(pending_target_temp) + steps;
          if (new_temp < 10) new_temp = 10;
          if (new_temp > 32) new_temp = 32;
          id(pending_target_temp) = new_temp;
      - lvgl.arc.update:
          id: temp_arc
          value: !lambda 'return id(pending_target_temp);'
      - lvgl.label.update:
          id: target_temp_label
          text: !lambda 'return str_sprintf("%.0f°", id(pending_target_temp));'
      - script.execute: send_target_temp

  - platform: homeassistant
    id: climate_current_temp
    entity_id: climate.hitachi_heatpump
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: current_temp_label
          text: !lambda 'return str_sprintf("%.1f°C", x);'

  - platform: homeassistant
    id: climate_target_temp
    entity_id: climate.hitachi_heatpump
    attribute: temperature
    on_value:
      - lvgl.arc.update:
          id: temp_arc
          value: !lambda 'return x;'
      - lvgl.label.update:
          id: target_temp_label
          text: !lambda 'return str_sprintf("%.0f°", x);'
      - globals.set:
          id: pending_target_temp
          value: !lambda 'return x;'

text_sensor:
  - platform: homeassistant
    id: climate_hvac_mode
    entity_id: climate.hitachi_heatpump
    on_value:
      - lvgl.dropdown.update:
          id: hvac_mode_dropdown
          selected_text: !lambda 'return x;'

  - platform: homeassistant
    id: climate_fan_mode
    entity_id: climate.hitachi_heatpump
    attribute: fan_mode
    on_value:
      - lvgl.dropdown.update:
          id: fan_mode_dropdown
          selected_text: !lambda 'return x;'

touchscreen:
  id: touchscreen_id
  platform: cst816
  i2c_id: i2c_touchscreen
  address: 21
  interrupt_pin: GPIO5
  reset_pin: GPIO13
  skip_probe: true

display:
  id: display_id
  platform: mipi_spi
  model: GC9A01A
  cs_pin: GPIO9
  dc_pin: GPIO3
  reset_pin: GPIO14
  data_rate: 80MHz
  invert_colors: true
  show_test_card: false
  rotation: 0
  update_interval: never
  auto_clear_enabled: false

lvgl:
  displays:
    - display_id

  touchscreens:
    - touchscreen_id

  page_wrap: true

  pages:
    - id: page_climate
      bg_color: 0x1A1A2E
      widgets:
        - arc:
            id: temp_arc
            align: TOP_MID
            y: 15
            width: 140
            height: 140
            min_value: 10
            max_value: 32
            start_angle: 135
            end_angle: 45
            value: 23
            adjustable: false
            arc_color: 0xFF8C42
            widgets:
              - label:
                  id: target_temp_label
                  text: "23°"
                  align: CENTER
                  y: -10
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

              - label:
                  id: current_temp_label
                  text: "--.-°C"
                  align: CENTER
                  y: 28
                  text_color: 0xAAAAAA
                  text_font: montserrat_12

        - label:
            text: "Mode"
            align: TOP_MID
            x: -48
            y: 158
            text_color: 0x808080
            text_font: montserrat_12

        - dropdown:
            id: hvac_mode_dropdown
            align: TOP_MID
            x: -48
            y: 168
            width: 75
            height: 32
            bg_color: 0x2A2A3E
            text_color: 0xFFFFFF
            border_color: 0x44445A
            text_font: montserrat_12
            dropdown_list:
              main:
                bg_color: 0x2A2A3E
                text_color: 0xFFFFFF
                border_color: 0x44445A
                text_font: montserrat_10
              selected:
                bg_color: 0xFF8C42
                text_color: 0x1A1A2E
            options:
              - "off"
              - "heat"
              - "cool"
              - "heat_cool"
              - "dry"
              - "fan_only"
            on_value:
              - homeassistant.service:
                  service: climate.set_hvac_mode
                  data:
                    entity_id: climate.hitachi_heatpump
                    hvac_mode: !lambda 'return text;'

        - label:
            text: "Fan"
            align: TOP_MID
            x: 48
            y: 158
            text_color: 0x808080
            text_font: montserrat_12

        - dropdown:
            id: fan_mode_dropdown
            align: TOP_MID
            x: 48
            y: 168
            width: 75
            height: 32
            bg_color: 0x2A2A3E
            text_color: 0xFFFFFF
            border_color: 0x44445A
            text_font: montserrat_12
            dropdown_list:
              main:
                bg_color: 0x2A2A3E
                text_color: 0xFFFFFF
                border_color: 0x44445A
                text_font: montserrat_10
              selected:
                bg_color: 0xFF8C42
                text_color: 0x1A1A2E
            options:
              - "quiet"
              - "low"
              - "medium"
              - "medium_high"
              - "high"
              - "auto"
            on_value:
              - homeassistant.service:
                  service: climate.set_fan_mode
                  data:
                    entity_id: climate.hitachi_heatpump
                    fan_mode: !lambda 'return text;'

      on_swipe_left:
        - lvgl.page.next:
      on_swipe_right:
        - lvgl.page.previous:

    - id: page_lighting
      bg_color: 0x2E2A1A
      widgets:
        - label:
            text: "Lighting"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_24
      on_swipe_left:
        - lvgl.page.next:
      on_swipe_right:
        - lvgl.page.previous:

    - id: page_solar
      bg_color: 0x1A2E1F
      widgets:
        - label:
            text: "Solar"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_24
      on_swipe_left:
        - lvgl.page.next:
      on_swipe_right:
        - lvgl.page.previous:

    - id: page_settings
      bg_color: 0x2A1A2E
      widgets:
        - label:
            text: "Settings"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_24
      on_swipe_left:
        - lvgl.page.next:
      on_swipe_right:
        - lvgl.page.previous:
